name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (src)
        run: npm run typecheck

      - name: Typecheck (test)
        run: npm run typecheck:test

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          node dist/cli.js --version
          node dist/cli.js --help > /dev/null

      - name: Verify dist integrity
        run: |
          test -f dist/cli.js
          test -f dist/index.js
          test -d dist/analyzer
          test -d dist/planner
          test -d dist/validator
          test -d dist/migrator
          test -d dist/deploy
          test -d dist/executor
          test -d dist/runtime
          test -d dist/remote
          test -d dist/server
          test -d dist/tui
          echo "dist integrity OK"
