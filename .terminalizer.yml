# Terminalizer config — lovable-migrate demo
# Uso: terminalizer record --config .terminalizer.yml demo-session
#      terminalizer render demo-session -o docs/media/demo-full.gif

command: lovable-migrate demo

cwd: null

env:
  recording: true
  COLORTERM: truecolor
  TERM: xterm-256color

cols: 80
rows: 40

repeat: 0         # 0 = não repetir o GIF
quality: 100
frameDelay: auto
maxIdleTime: 2000 # pausa máxima de 2s entre frames

frameBox:
  type: floating
  title: ""
  style:
    border: "none"
    boxShadow: "0 20px 60px rgba(0,0,0,0.5)"
    margin: "0px"
    padding: "20px"

watermark:
  imagePath: null

cursorStyle: block
fontFamily: '"JetBrains Mono", "Fira Code", "Cascadia Code", monospace'
fontSize: 14
lineHeight: 1.2
letterSpacing: 0

theme:
  background: "#0d1117"
  foreground: "#c9d1d9"
  cursor: "#58a6ff"
  black: "#0d1117"
  red: "#ff7b72"
  green: "#3fb950"
  yellow: "#d29922"
  blue: "#58a6ff"
  magenta: "#bc8cff"
  cyan: "#39c5cf"
  white: "#b1bac4"
  brightBlack: "#6e7681"
  brightRed: "#ff7b72"
  brightGreen: "#3fb950"
  brightYellow: "#e3b341"
  brightBlue: "#79c0ff"
  brightMagenta: "#d2a8ff"
  brightCyan: "#56d364"
  brightWhite: "#f0f6fc"
